<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceptance Atlas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="atlas-shell" data-testid="acceptance-atlas">
      <header class="top-rail" role="banner">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">Tx</div>
          <div>
            <p class="eyebrow">Definition Of Done</p>
            <h1>Acceptance Atlas</h1>
          </div>
        </div>
        <div class="rail-status">
          <div class="status-chip" data-testid="manifest-status-chip" id="manifest-status-chip"></div>
          <div class="status-chip secondary" data-testid="motion-mode-chip">
            Motion <span id="motion-mode" data-testid="motion-mode">standard</span>
          </div>
        </div>
        <form class="filter-bar" aria-label="Atlas filters">
          <label>
            <span>Phase</span>
            <select id="filter-phase" data-testid="filter-phase" aria-label="Phase filter">
              <option value="all">All phases</option>
            </select>
          </label>
          <label>
            <span>Layer</span>
            <select id="filter-layer" data-testid="filter-layer" aria-label="Acceptance layer filter">
              <option value="all">All layers</option>
              <option value="roadmap">Roadmap completion</option>
              <option value="blueprint">Blueprint closure</option>
              <option value="release">Release admissibility</option>
            </select>
          </label>
          <label>
            <span>Gaps</span>
            <select id="filter-gap" data-testid="filter-gap" aria-label="Gap filter">
              <option value="all">All tasks</option>
              <option value="gapped">Only typed gaps</option>
            </select>
          </label>
        </form>
      </header>

      <div class="atlas-layout">
        <aside class="phase-spine" aria-label="Phase spine">
          <div class="spine-header">
            <p class="eyebrow">Execution Spine</p>
            <h2>Phase And Wave Gates</h2>
          </div>
          <div class="spine-list" data-testid="phase-spine" id="phase-spine"></div>
        </aside>

        <main class="matrix-pane" role="main">
          <section class="overview-band">
            <article class="summary-card">
              <p class="summary-label">Visible tasks</p>
              <p class="summary-value" data-testid="summary-visible-count" id="summary-visible-count">0</p>
            </article>
            <article class="summary-card">
              <p class="summary-label">Release-bound</p>
              <p class="summary-value" data-testid="summary-release-count" id="summary-release-count">0</p>
            </article>
            <article class="summary-card">
              <p class="summary-label">Typed gaps</p>
              <p class="summary-value" data-testid="summary-gap-count" id="summary-gap-count">0</p>
            </article>
            <article class="summary-card wide">
              <p class="summary-label">Result set</p>
              <p class="summary-copy" data-testid="results-summary" id="results-summary"></p>
            </article>
          </section>

          <section class="matrix-panel">
            <div class="matrix-header">
              <div>Task</div>
              <div>Coverage</div>
              <div>Vectors</div>
              <div>Gates</div>
            </div>
            <div
              class="task-list"
              id="task-list"
              data-testid="task-list"
              role="listbox"
              aria-label="Acceptance task rows"
            ></div>
          </section>
        </main>

        <aside
          class="inspector-pane"
          id="inspector"
          data-testid="inspector"
          aria-live="polite"
          hidden
        >
          <div class="inspector-header">
            <div>
              <p class="eyebrow">Focused task</p>
              <h2 id="inspector-title">Select a task</h2>
            </div>
            <button type="button" class="ghost-button" id="inspector-close" data-testid="inspector-close">
              Close
            </button>
          </div>
          <div class="inspector-body" id="inspector-body"></div>
        </aside>
      </div>

      <div class="live-region" aria-live="polite" data-testid="atlas-live-region" id="atlas-live-region"></div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
